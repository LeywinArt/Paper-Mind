services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cohere-qa-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: document_qa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d document_qa"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: cohere-qa-web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/document_qa
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-cohere-enterprise-qa-secret-key-change-me}
    env_file:
      - .env

volumes:
  pgdata:
